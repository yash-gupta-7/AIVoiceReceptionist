name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest -q
      - name: Security scan (dependency audit)
        run: pip install pip-audit && pip-audit -r requirements.txt || true

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Typecheck + build
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: apps/dashboard/dist

  docker:
    runs-on: ubuntu-latest
    needs: [backend, dashboard]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          docker build -f infra/docker/backend.Dockerfile -t clinic-backend .
          docker build -f infra/docker/dashboard.Dockerfile -t clinic-dashboard .
